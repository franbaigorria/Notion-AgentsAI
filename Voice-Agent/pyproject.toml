[project]
name = "voice-agent"
version = "0.1.0"
description = "Agente de voz argentino para clínicas — powered by LiveKit Agents"
requires-python = ">=3.11,<3.14"
dependencies = [
    "livekit-agents>=1.0,<2.0",
    "livekit-plugins-anthropic>=1.0,<2.0",
    "livekit-plugins-elevenlabs>=1.0,<2.0",
    "livekit-plugins-silero>=1.0,<2.0",
    "livekit-plugins-deepgram>=1.0,<2.0",
    "python-dotenv>=1.0",
    "elevenlabs>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/voice_agent"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
