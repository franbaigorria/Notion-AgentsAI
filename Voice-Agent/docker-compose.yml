# Docker Compose — local development services for Voice Agent
#
# Usage:
#   docker compose up -d postgres          # start only Postgres
#   docker compose down                    # stop + remove containers
#   psql postgresql://voiceagent:voiceagent@localhost:55432/voiceagent_test
#
# The Postgres service is intentionally EPHEMERAL (no volume mount) so the dev
# database is always clean after a compose-down. Add a named volume if you need
# data persistence across restarts.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: voiceagent
      POSTGRES_PASSWORD: voiceagent
      POSTGRES_DB: voiceagent_test
    ports:
      - "55432:5432"
    # No volume — ephemeral dev/test instance, data is lost on container stop.
    # Uncomment below and add a top-level `volumes:` block for persistence:
    # volumes:
    #   - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceagent -d voiceagent_test"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
