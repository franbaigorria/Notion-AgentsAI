# Flows de conversación — vertical clinica
# Cada flow define los pasos y los triggers de escalación

flows:

  agendar_turno:
    trigger: ["turno", "turno médico", "sacar turno", "reservar", "agenda", "quiero un turno"]
    steps:
      - detectar_especialidad: "Preguntá con qué especialidad necesita el turno. Si pregunta cuáles hay, informá las disponibles desde la KB."
      - confirmar_datos: "Pedí nombre completo, DNI y obra social (o si abona particular). Si ya los dio, no los vuelvas a pedir."
      - proponer_horario: "Informá el horario disponible para esa especialidad según la KB (días y franja horaria del profesional). Preguntá si alguno le viene bien."
      - confirmar_turno: "Confirmá el turno con los datos recolectados: especialidad, profesional, día/horario, nombre y DNI. Decile que el equipo va a enviarle una confirmación por mensaje."
    escalate_if:
      - el paciente pide una especialidad que no está disponible
      - el paciente pide un médico específico y no está en la KB

  consulta_cobertura:
    trigger: ["cobertura", "obra social", "plan", "si cubre", "prepaga"]
    steps:
      - identificar_obra_social: ¿Qué obra social tenés? ¿Y el plan?
      - buscar_en_kb: consultar base de conocimiento con obra_social + plan
      - responder: informar qué cubre y qué no, con tope si corresponde
    escalate_if:
      - obra social no encontrada en KB
      - rag_score < 0.7

  info_general:
    trigger: ["horario", "dónde están", "cómo llego", "dirección", "teléfono", "estacionamiento"]
    steps:
      - identificar_consulta: qué información específica necesita
      - buscar_en_kb: consultar base de conocimiento
      - responder: dar la información directamente
    escalate_if:
      - información no disponible en KB

  reagendar_cancelar:
    trigger: ["cancelar", "cambiar turno", "reagendar", "no puedo ir", "mover el turno"]
    steps:
      - identificar_turno: "Pedí nombre completo y la fecha aproximada del turno que quiere modificar o cancelar."
      - confirmar_accion: "Confirmá si quiere reagendar o cancelar. Si reagenda, preguntá qué día/horario le vendría mejor."
      - registrar: "Informale que el pedido fue registrado y que el equipo administrativo va a confirmar el cambio o cancelación por mensaje en las próximas horas."
    escalate_if:
      - el turno es en menos de 2 horas
      - el paciente insiste en hablar con alguien del equipo
