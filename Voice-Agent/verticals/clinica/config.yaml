# Configuración del vertical: Clínica / Consultorio privado
# Documentación: verticals/clinica/README.md

agent_name: Asistente
language: es

# ═══════════════════════════════════════════════════
# MODO DE OPERACIÓN
# ═══════════════════════════════════════════════════
# Controlado por la env var AGENT_MODE (pipeline | realtime).
# NO se define acá — se setea en Railway o en el entorno local.
# Default: pipeline

# ═══════════════════════════════════════════════════
# CONFIG DEL MODO PIPELINE (STT → LLM → TTS)
# Solo se usa si mode: pipeline
# ═══════════════════════════════════════════════════

# --- STT ---
stt_provider: deepgram
stt_model: nova-3
# Alternativa: ElevenLabs Scribe (más lento, 1.7s+ delay, no recomendado)
# stt_provider: elevenlabs
# stt_model: scribe_v2_realtime
# Alternativa: OpenAI gpt-4o-mini-transcribe (streaming WebSocket o batch REST)
# stt_provider: openai
# stt_model: gpt-4o-mini-transcribe
# stt_use_realtime: true   # true = WebSocket streaming (default); false = batch REST

# --- LLM ---
llm_provider: claude
llm_model: claude-haiku-4-5-20251001
# Alternativas:
# llm_provider: openai  ; llm_model: gpt-4.1-nano            # más rápido, menos consistente
# llm_provider: groq    ; llm_model: llama-3.1-8b-instant    # ultra rápido, rate limit free
llm_provider: gemini
llm_model: gemini-3.1-flash-lite-preview   # Google AI Studio, requiere GEMINI_API_KEY

# --- TTS ---
tts_provider: elevenlabs
tts_model: eleven_flash_v2_5
# Para Fish Speech (expression tags activos): descomentar y comentar elevenlabs
# tts_provider: fish_speech
# tts_model: "s2-pro"
# Alternativas:
# tts_provider: elevenlabs ; tts_model: eleven_flash_v2_5
# tts_provider: cartesia ; tts_model: sonic-multilingual   # ultra baja latencia
# tts_provider: deepgram ; tts_model: aura-2-antonia-es    # solo funciona bien en US-East
# Alternativa: OpenAI gpt-4o-mini-tts (billing por token; soporta instructions de tono)
# tts_provider: openai
# tts_model: gpt-4o-mini-tts
# voice_id: ash   # voces: alloy, ash, coral, echo, fable, onyx, nova, sage, shimmer
# tts_instructions: "Respondé con calidez y brevedad. Sos la recepcionista de una clínica."

# Voice settings (ElevenLabs) — tuning fino
# stability:        0.0 (expresivo) → 1.0 (estable)
# similarity_boost: 0.0 (variado) → 1.0 (fiel al original)
# style:            0.0 (neutro) → 1.0 (estilizado)
# speed:            0.7 (lento) → 1.3 (rápido)
voice_settings:
  stability: 0.6
  similarity_boost: 0.8
  style: 0.15
  speed: 1.05

# Text normalization — cómo se pronuncian números/siglas
# "on"   = siempre normaliza ("OSDE 310" → "OSDE tres diez")
# "auto" = el modelo decide
# "off"  = lee literal
apply_text_normalization: "on"

# ═══════════════════════════════════════════════════
# CONFIG DEL MODO REALTIME (speech-to-speech)
# Solo se usa si mode: realtime
# ═══════════════════════════════════════════════════

realtime:
  model: gpt-realtime-1.5
  # Voces disponibles: alloy, echo, shimmer, ash, ballad, coral, sage, verse
  #   ash    → masculina, recomendada para recepcionista
  #   verse  → masculina, expresiva
  #   echo   → masculina, clásica
  #   ballad → masculina, lírica
  voice: ash
  temperature: 0.7
  speed: 1.5

# ═══════════════════════════════════════════════════
# Saludo inicial (ambos modos)
# ═══════════════════════════════════════════════════

greeting: "Saludá al paciente con calidez y preguntale en qué podés ayudarlo."
